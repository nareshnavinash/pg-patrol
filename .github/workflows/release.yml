name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npx jest --no-coverage

      - name: Build (${{ matrix.browser }})
        run: npm run build:${{ matrix.browser }}

      - name: Lint Firefox extension
        if: matrix.browser == 'firefox'
        run: npx web-ext lint --source-dir dist-firefox/

      - name: Package (${{ matrix.browser }})
        run: npm run package:${{ matrix.browser }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pg-patrol-${{ matrix.browser }}
          path: pg-patrol-${{ matrix.browser }}.zip

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download Chrome artifact
        uses: actions/download-artifact@v4
        with:
          name: pg-patrol-chrome

      - name: Download Firefox artifact
        uses: actions/download-artifact@v4
        with:
          name: pg-patrol-firefox

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pg-patrol-chrome.zip
            pg-patrol-firefox.zip
          generate_release_notes: true
